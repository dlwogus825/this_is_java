services:
  mysql-db:
    image: mysql:8.0
    container_name: my-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: beginner      # 기본 DB를 beginner로 변경
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypass1234
    ports:
      - "3308:3306"
    volumes:
      - ./data:/var/lib/mysql